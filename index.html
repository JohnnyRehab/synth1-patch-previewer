<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Synth1 Patch Visualizer v1.8</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 16px; background: #0f0f0f; color: #e0e0e0; margin: 0; }
    h2 { color: #4fc3f7; margin: 0 0 16px 0; display: flex; justify-content: space-between; align-items: center; }
.master-vol { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.master-vol input { width: 120px; }

.container { display: flex; gap: 16px; height: calc(100vh - 80px); }
.sidebar { width: 300px; display: flex; flex-direction: column; }
.main { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

    #dropzone { border: 2px dashed #4fc3f7; padding: 20px; text-align: center; margin-bottom: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    #dropzone.dragover { background: #1a1a; border-color: #29b6f6; }
.list-header { display: flex; justify-content: space-between; align-items: center; padding: 0 8px 8px; font-size: 12px; color: #999; }
.clear-btn { background: #f44336; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.clear-btn:hover { background: #d32f2f; }
    #patchList { flex: 1; overflow-y: auto; background: #1a1a1a; border-radius: 8px; padding: 8px; }
.patch-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin: 4px 0; background: #252525; border-radius: 4px; cursor: pointer; transition: 0.1s; font-size: 13px; }
.patch-item:hover { background: #333; }
.patch-item.active { background: #4fc3f7; color: #000; font-weight: bold; }
.patch-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.patch-loud { font-size: 10px; color: #f44336; margin: 0 6px; }
.patch-quiet { font-size: 10px; color: #ffc107; margin: 0 6px; }
.patch-mute { font-size: 10px; color: #9e9e9e; margin: 0 6px; }
.patch-fixed { font-size: 10px; color: #4caf50; margin: 0 6px; }
.delete-btn { background: transparent; border: none; color: #999; cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
.delete-btn:hover { color: #f44336; }

.section { background: #1a1a1a; border-radius: 8px; padding: 12px; }
.section h3 { margin: 0 0 12px 0; color: #4fc3f7; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

.oscilloscope { background: #000; border-radius: 4px; padding: 8px; }
    #waveCanvas { width: 100%; height: 120px; display: block; }
.scope-info { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: #999; }
.peak-meter { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 4px; overflow: hidden; }
.peak-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336); transition: width 0.05s; }

.param-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.param { background: #252525; padding: 8px; border-radius: 4px; }
.param-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.param-value { font-size: 13px; font-weight: bold; color: #fff; }
.param-value.corrected { color: #4caf50; }
.param-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 4px; overflow: hidden; }
.param-bar-fill { height: 100%; background: #4fc3f7; transition: width 0.1s; }

.keyboard { position: relative; height: 100px; user-select: none; background: #000; border-radius: 4px; overflow: hidden; }
.key { position: absolute; cursor: pointer; }
.white-key { width: 32px; height: 100px; background: #fff; border-right: 1px solid #ddd; z-index: 1; }
.white-key.active { background: #4fc3f7; }
.black-key { width: 20px; height: 65px; background: #222; z-index: 2; border-radius: 0 0 3px 3px; }
.black-key.active { background: #29b6f6; }
  </style>
</head>
<body>
  <h2>
    Synth1 Patch Visualizer v1.8
    <div class="master-vol">
      Master Vol: <input type="range" id="masterVol" min="0" max="100" value="30">
      <span id="masterVolVal">30%</span>
      <label><input type="checkbox" id="limiter" checked> Limiter</label>
    </div>
  </h2>
  <div class="container">
    <div class="sidebar">
      <div id="dropzone">
        JSONをドロップ<br>or クリックで選択<br><small>最大10件</small>
        <input type="file" id="fileInput" accept=".json" multiple style="display:none">
      </div>
      <div class="list-header">
        <span id="patchCount">0 / 10</span>
        <button class="clear-btn" id="clearAll">全削除</button>
      </div>
      <div id="patchList"></div>
    </div>

    <div class="main">
      <div class="section">
        <h3>OSCILLOSCOPE - 波形モニター</h3>
        <div class="oscilloscope">
          <canvas id="waveCanvas"></canvas>
          <div class="scope-info">
            <span id="freqDisplay">--- Hz</span>
            <span id="peakDisplay">-∞ dB</span>
          </div>
          <div class="peak-meter"><div class="peak-fill" id="peakFill"></div></div>
        </div>
      </div>

      <div class="section">
        <h3>KEYBOARD - C3 to B4</h3>
        <div class="keyboard" id="keyboard"></div>
      </div>

      <div class="section">
        <h3>OSCILLATOR</h3>
        <div class="param-grid" id="oscParams"></div>
      </div>

      <div class="section">
        <h3>FILTER & AMP</h3>
        <div class="param-grid" id="filterAmpParams"></div>
      </div>

      <div class="section">
        <h3>LFO & EFFECTS</h3>
        <div class="param-grid" id="lfoFxParams"></div>
      </div>
    </div>
  </div>

<script>
let audioContext = null;
let masterGain = null;
let masterCompressor = null;
let analyser = null;
let currentPatch = null;
const activeNotes = new Map();
let patches = [];

const WAVEFORMS = ['sawtooth','triangle','sine','square'];
const FILTER_TYPES = ['LP12','LP24','HP12','BP12','Notch'];

document.getElementById('masterVol').oninput = e => {
  document.getElementById('masterVolVal').textContent = e.target.value + '%';
  if (masterGain) masterGain.gain.value = e.target.value / 100;
};

const map = {
  cutoff: v => Math.max(20, Math.pow(2, v/127*10.3) * 20),
  q: v => v/127*20,
  time: v => {
    // Attack長すぎ対策：120以上は0.5秒上限
    if (v > 120) return 0.5;
    return Math.pow(v/127, 2) * 5;
  },
  level: v => v/127,
  detune: v => v-64,
  pitch: v => v-64,
  bipolar: v => (v-64) / 63
};

// 強化版：undefined補完 + 0補正
function sanitizePatch(p) {
  const s = JSON.parse(JSON.stringify(p));
  const defaults = {
    osc1_shape: 0, osc2_shape: 0, osc_mix: 64,
    osc1_octave: 2, osc2_octave: 1, osc1_semitone: 0, osc2_semitone: 0,
    osc2_pitch: 64, osc2_fine_tune: 64,
    filter_type: 0, filter_cutoff: 127, filter_resonance: 0, filter_env_amount: 64,
    filter_attack: 0, filter_decay: 64, filter_sustain: 127, filter_release: 0,
    amp_attack: 0, amp_decay: 64, amp_sustain: 127, amp_release: 20, amp_gain: 100,
    unison_mode: 0, unison_detune: 0
  };

  s._corrected = {};
  Object.keys(defaults).forEach(key => {
    if (s[key] === undefined) {
      s[key] = defaults[key];
      s._corrected[key] = 'undefined→default';
    }
  });

  // 0補正：無音になる危険な値
  if (s.amp_gain === 0) { s.amp_gain = 64; s._corrected.amp_gain = '0→50%'; }
  if (s.amp_sustain === 0) { s.amp_sustain = 20; s._corrected.amp_sustain = '0→16%'; }

  return s;
}

function estimateLoudness(p) {
  if (p.amp_gain === 0 || p.amp_sustain === 0) return 'mute';
  const gain = p.amp_gain / 127;
  const reso = p.filter_resonance / 127;
  const sus = p.amp_sustain / 127;
  const score = gain * sus * (1 + reso * 2);
  if (score > 1.2) return 'loud';
  if (score < 0.3) return 'quiet';
  return 'normal';
}

const noteFreqs = {'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,'E3':164.81,'F3':174.61,'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,'A#3':233.08,'B3':246.94,'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88};
(function(){
  const kb = document.getElementById('keyboard');
  const white = ['C3','D3','E3','F3','G3','A3','B3','C4','D4','E4','F4','G4','A4','B4'];
  const black = {'C#3':0,'D#3':1,'F#3':3,'G#3':4,'A#3':5,'C#4':7,'D#4':8,'F#4':10,'G#4':11,'A#4':12};
  white.forEach((n,i)=>{const k=document.createElement('div');k.className='key white-key';k.style.left=(i*32)+'px';k.dataset.note=n;kb.appendChild(k);});
  Object.entries(black).forEach(([n,p])=>{const k=document.createElement('div');k.className='key black-key';k.style.left=(p*32+22)+'px';k.dataset.note=n;kb.appendChild(k);});
})();

function initAudio() {
  if (audioContext) return;
  audioContext = new AudioContext();
  masterGain = audioContext.createGain();
  masterGain.gain.value = 0.3;
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  masterCompressor = audioContext.createDynamicsCompressor();
  masterCompressor.threshold.value = -24;
  masterCompressor.knee.value = 30;
  masterCompressor.ratio.value = 12;
  masterCompressor.attack.value = 0.003;
  masterCompressor.release.value = 0.25;
  masterCompressor.connect(analyser).connect(masterGain).connect(audioContext.destination);
}

const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');
canvas.width = canvas.offsetWidth * 2;
canvas.height = 240;
ctx.scale(2, 2);

function drawWaveform() {
  if (!analyser) {
    requestAnimationFrame(drawWaveform);
    return;
  }
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  analyser.getByteTimeDomainData(dataArray);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width/2, 120);
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#4fc3f7';
  ctx.beginPath();
  const sliceWidth = (canvas.width/2) / bufferLength;
  let x = 0;
  for (let i = 0; i < bufferLength; i++) {
    const v = dataArray[i] / 128.0;
    const y = v * 60;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();
  let peak = 0;
  for (let i = 0; i < bufferLength; i++) {
    const v = Math.abs(dataArray[i] - 128);
    if (v > peak) peak = v;
  }
  const db = peak > 0? 20 * Math.log10(peak / 128) : -Infinity;
  document.getElementById('peakDisplay').textContent = db > -60? db.toFixed(1) + ' dB' : '-∞ dB';
  document.getElementById('peakFill').style.width = Math.max(0, Math.min(100, (db + 60) * 1.67)) + '%';
  requestAnimationFrame(drawWaveform);
}
drawWaveform();

function visualizeParams(p) {
  const osc = document.getElementById('oscParams');
  const fa = document.getElementById('filterAmpParams');
  const lf = document.getElementById('lfoFxParams');

  const param = (label, val, raw, pct, corrected) => `
    <div class="param">
      <div class="param-label">${label}</div>
      <div class="param-value ${corrected? 'corrected' : ''}">${val}${corrected? ' *' : ''}</div>
      <div class="param-bar"><div class="param-bar-fill" style="width:${Math.max(0,Math.min(100,pct))}%"></div></div>
    </div>`;

  const waveName = v => v===4? 'NOISE' : WAVEFORMS[v] || 'SAW';
  const c = p._corrected || {};

  osc.innerHTML =
    param('OSC1 Wave', waveName(p.osc1_shape), p.osc1_shape, p.osc1_shape/4*100, c.osc1_shape) +
    param('OSC2 Wave', waveName(p.osc2_shape), p.osc2_shape, p.osc2_shape/4*100, c.osc2_shape) +
    param('OSC Mix', (p.osc_mix/1.27).toFixed(0)+'%', p.osc_mix, p.osc_mix/127*100, c.osc_mix) +
    param('OSC2 Detune', map.detune(p.osc2_fine_tune)+' cent', p.osc2_fine_tune, p.osc2_fine_tune/127*100, c.osc2_fine_tune) +
    param('Unison', p.unison_mode? 'On' : 'Off', p.unison_mode, p.unison_mode*100, c.unison_mode) +
    param('Uni Detune', p.unison_detune, p.unison_detune, p.unison_detune/127*100, c.unison_detune);

  fa.innerHTML =
    param('Filter Type', FILTER_TYPES[p.filter_type]||'LP12', p.filter_type, p.filter_type/4*100, c.filter_type) +
    param('Cutoff', Math.round(map.cutoff(p.filter_cutoff))+'Hz', p.filter_cutoff, p.filter_cutoff/127*100, c.filter_cutoff) +
    param('Resonance', map.q(p.filter_resonance), p.filter_resonance, p.filter_resonance/127*100, c.filter_resonance) +
    param('F.Env Amt', (map.bipolar(p.filter_env_amount)*100).toFixed(0)+'%', p.filter_env_amount, p.filter_env_amount/127*100, c.filter_env_amount) +
    param('F.Attack', map.time(p.filter_attack).toFixed(2)+'s', p.filter_attack, p.filter_attack/127*100, c.filter_attack) +
    param('F.Sustain', (p.filter_sustain/1.27).toFixed(0)+'%', p.filter_sustain, p.filter_sustain/127*100, c.filter_sustain) +
    param('A.Attack', map.time(p.amp_attack).toFixed(2)+'s', p.amp_attack, p.amp_attack/127*100, c.amp_attack) +
    param('A.Sustain', (p.amp_sustain/1.27).toFixed(0)+'%', p.amp_sustain, p.amp_sustain/127*100, c.amp_sustain) +
    param('A.Release', map.time(p.amp_release).toFixed(2)+'s', p.amp_release, p.amp_release/127*100, c.amp_release) +
    param('Amp Gain', (p.amp_gain/1.27).toFixed(0)+'%', p.amp_gain, p.amp_gain/127*100, c.amp_gain);

  lf.innerHTML =
    param('LFO1 Speed', (p.lfo1_speed/127*20).toFixed(1)+'Hz', p.lfo1_speed, p.lfo1_speed/127*100, c.lfo1_speed) +
    param('LFO1 Depth', (p.lfo1_depth/1.27).toFixed(0)+'%', p.lfo1_depth, p.lfo1_depth/127*100, c.lfo1_depth) +
    param('Delay Time', (p.delay_time/127*1000).toFixed(0)+'ms', p.delay_time, p.delay_time/127*100, c.delay_time) +
    param('Delay Mix', (p.delay_mix/1.27).toFixed(0)+'%', p.delay_mix, p.delay_mix/127*100, c.delay_mix) +
    param('Chorus', p.chorus_enable > 64? 'On' : 'Off', p.chorus_enable, p.chorus_enable/127*100, c.chorus_enable);
}

function createNoiseSource() {
  const bufferSize = audioContext.sampleRate * 2;
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const output = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
  const source = audioContext.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  return source;
}

function createFilter(type, freq, q) {
  const filter = audioContext.createBiquadFilter();
  switch(type) {
    case 0: filter.type = 'lowpass'; break;
    case 1: filter.type = 'lowpass'; break;
    case 2: filter.type = 'highpass'; break;
    case 3: filter.type = 'bandpass'; break;
    case 4: filter.type = 'notch'; break;
    default: filter.type = 'lowpass';
  }
  filter.frequency.value = freq;
  filter.Q.value = q;
  return filter;
}

function noteOn(freq, noteName) {
  if (!currentPatch || activeNotes.has(noteName)) return;
  initAudio();
  const now = audioContext.currentTime;
  const p = sanitizePatch(currentPatch.parameters);

  document.getElementById('freqDisplay').textContent = freq.toFixed(1) + ' Hz';

  const loudness = estimateLoudness(p);
  const autoGain = loudness === 'loud'? 0.3 : loudness === 'quiet'? 1.5 : 1.0;

  const osc1 = p.osc1_shape === 4? createNoiseSource() : audioContext.createOscillator();
  if (p.osc1_shape!== 4) {
    osc1.type = WAVEFORMS[p.osc1_shape] || 'sawtooth';
    osc1.frequency.value = freq * Math.pow(2, ((p.osc1_octave||1)-1) + (p.osc1_semitone||0)/12);
  }
  const osc1Gain = audioContext.createGain();
  // NaN対策：??でデフォルト値
  const mix = p.osc_mix?? 64;
  const gain = p.amp_gain?? 100;
  osc1Gain.gain.value = Math.max(0.01, (127 - mix) / 127 * (gain/127) * autoGain);

  const osc2 = p.osc2_shape === 4? createNoiseSource() : audioContext.createOscillator();
  if (p.osc2_shape!== 4) {
    osc2.type = WAVEFORMS[p.osc2_shape] || 'sawtooth';
    osc2.frequency.value = freq * Math.pow(2, ((p.osc2_octave||1)-1) + (p.osc2_semitone||0)/12);
    osc2.detune.value = (p.osc2_fine_tune - 64) + (p.osc2_pitch - 64) * 100;
  }
  const osc2Gain = audioContext.createGain();
  osc2Gain.gain.value = Math.max(0.01, mix / 127 * (gain/127) * autoGain);

  const unisonOscs = [];
  if (p.unison_mode > 0) {
    [-1, 1].forEach(d => {
      const u = p.osc1_shape === 4? createNoiseSource() : audioContext.createOscillator();
      if (p.osc1_shape!== 4) {
        u.type = WAVEFORMS[p.osc1_shape] || 'sawtooth';
        u.frequency.value = osc1.frequency.value;
        u.detune.value = d * p.unison_detune * 0.5;
      }
      unisonOscs.push(u);
    });
  }

  const baseCutoff = map.cutoff(p.filter_cutoff);
  const qVal = p.filter_resonance / 127 * 20;
  const filter1 = createFilter(p.filter_type, baseCutoff, qVal);
  const filters = [filter1];

  if (p.filter_type === 1) {
    const filter2 = createFilter(p.filter_type, baseCutoff, qVal);
    filters.push(filter2);
  }

  const egAmt = map.bipolar(p.filter_env_amount) * 8000;
  const ampEnv = audioContext.createGain();
  ampEnv.gain.value = 0;

  osc1.connect(osc1Gain).connect(filters[0]);
  osc2.connect(osc2Gain).connect(filters[0]);
  unisonOscs.forEach(u => u.connect(filters[0]));

  if (filters.length > 1) {
    filters[0].connect(filters[1]);
    filters[1].connect(ampEnv);
  } else {
    filters[0].connect(ampEnv);
  }
  ampEnv.connect(masterCompressor);

  const atk = map.time(p.amp_attack);
  const dec = map.time(p.amp_decay);
  const sus = p.amp_sustain/127;
  const rel = map.time(p.amp_release);
  const fatk = map.time(p.filter_attack);
  const fdec = map.time(p.filter_decay);
  const fsus = p.filter_sustain/127;

  const peakCutoff = Math.max(20, baseCutoff + egAmt);
  const susCutoff = Math.max(20, baseCutoff + egAmt * fsus);

  filters.forEach(f => {
    f.frequency.setValueAtTime(baseCutoff, now);
    f.frequency.linearRampToValueAtTime(peakCutoff, now + fatk);
    f.frequency.linearRampToValueAtTime(susCutoff, now + fatk + fdec);
  });

  ampEnv.gain.setValueAtTime(0, now);
  ampEnv.gain.linearRampToValueAtTime(1, now + atk);
  ampEnv.gain.linearRampToValueAtTime(sus, now + atk + dec);

  osc1.start(now); osc2.start(now); unisonOscs.forEach(u=>u.start(now));
  activeNotes.set(noteName, {osc1,osc2,unisonOscs,filters,ampEnv,baseCutoff,rel,p});
}

function noteOff(noteName) {
  const n = activeNotes.get(noteName);
  if (!n) return;
  const now = audioContext.currentTime;
  const stopTime = now + n.rel;

  n.filters.forEach(f => {
    f.frequency.cancelScheduledValues(now);
    f.frequency.setValueAtTime(f.frequency.value, now);
    f.frequency.linearRampToValueAtTime(n.baseCutoff, stopTime);
  });

  n.ampEnv.gain.cancelScheduledValues(now);
  n.ampEnv.gain.setValueAtTime(n.ampEnv.gain.value, now);
  n.ampEnv.gain.linearRampToValueAtTime(0, stopTime);

  n.osc1.stop(stopTime); n.osc2.stop(stopTime); n.unisonOscs.forEach(u=>u.stop(stopTime));
  activeNotes.delete(noteName);

  if (activeNotes.size === 0) {
    document.getElementById('freqDisplay').textContent = '--- Hz';
  }
}

function loadPatches(files) {
  const newPatches = Array.from(files);
  if (patches.length + newPatches.length > 10) {
    alert(`最大10件まで表示できます。古いものから削除されます。`);
  }

  newPatches.forEach(file => {
    file.text().then(t => {
      try {
        const json = JSON.parse(t);
        if (patches.length >= 10) patches.shift();
        patches.push({name: file.name.replace('.json',''), data: json});
        renderPatchList();
      } catch(e) { console.error('JSON parse error:', file.name, e); }
    });
  });
}

function deletePatch(idx) {
  if (currentPatch === patches[idx].data) currentPatch = null;
  patches.splice(idx, 1);
  renderPatchList();
  if (patches.length &&!currentPatch) document.querySelector('.patch-item').click();
  if (!patches.length) {
    document.getElementById('oscParams').innerHTML = '';
    document.getElementById('filterAmpParams').innerHTML = '';
    document.getElementById('lfoFxParams').innerHTML = '';
  }
}

function renderPatchList() {
  const list = document.getElementById('patchList');
  document.getElementById('patchCount').textContent = `${patches.length} / 10`;
  list.innerHTML = patches.map((p,i) => {
    const loud = estimateLoudness(p.data.parameters);
    const fixed = p.data.parameters._corrected;
    const badge = loud === 'loud'? '<span class="patch-loud">LOUD</span>' :
                  loud === 'quiet'? '<span class="patch-quiet">QUIET</span>' :
                  loud === 'mute'? '<span class="patch-mute">MUTE</span>' : '';
    const fixBadge = fixed? '<span class="patch-fixed">FIXED</span>' : '';
    return `<div class="patch-item" data-idx="${i}">
      <span class="patch-name">${p.name}</span>${badge}${fixBadge}
      <button class="delete-btn" data-idx="${i}">×</button>
    </div>`;
  }).join('');

  document.querySelectorAll('.patch-item').forEach(el => {
    el.onclick = (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      document.querySelectorAll('.patch-item').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      currentPatch = patches[el.dataset.idx].data;
      visualizeParams(currentPatch.parameters);
    };
  });

  document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      deletePatch(parseInt(btn.dataset.idx));
    };
  });

  if (patches.length &&!currentPatch) document.querySelector('.patch-item').click();
}

document.getElementById('clearAll').onclick = () => {
  if (confirm('全てのパッチを削除しますか？')) {
    patches.length = 0;
    currentPatch = null;
    renderPatchList();
    document.getElementById('oscParams').innerHTML = '';
    document.getElementById('filterAmpParams').innerHTML = '';
    document.getElementById('lfoFxParams').innerHTML = '';
  }
};

const dz = document.getElementById('dropzone');
dz.onclick = () => document.getElementById('fileInput').click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('dragover'); };
dz.ondragleave = () => dz.classList.remove('dragover');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('dragover'); loadPatches(e.dataTransfer.files); };
document.getElementById('fileInput').onchange = e => loadPatches(e.target.files);

const kb = document.getElementById('keyboard');
kb.addEventListener('mousedown', e => {
  if (!e.target.dataset.note) return;
  e.target.classList.add('active');
  noteOn(noteFreqs[e.target.dataset.note], e.target.dataset.note);
});
kb.addEventListener('mouseup', e => {
  if (!e.target.dataset.note) return;
  e.target.classList.remove('active');
  noteOff(e.target.dataset.note);
});
kb.addEventListener('mouseleave', e => {
  if (!e.target.dataset.note) return;
  e.target.classList.remove('active');
  noteOff(e.target.dataset.note);
});
</script>
</body>
</html>
